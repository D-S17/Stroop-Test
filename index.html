<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Stroop-Test</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 40px; background: #f5f5f5; }
    #word { font-size: 80px; font-weight: bold; margin: 50px; }
    button { font-size: 22px; padding: 15px 25px; margin: 10px; cursor: pointer; border-radius: 10px; border: 1px solid #333; }
    input { font-size: 18px; padding: 10px; margin: 5px; }
    #testArea, #resultArea { display: none; }
  </style>
</head>
<body>

<h1>Stroop-Test</h1>

<div id="startArea">
  <p>Bitte Name und Alter eingeben.</p>
  <input id="participantId" placeholder="Name">
  <input id="age" type="number" placeholder="Alter">
  <br><br>
  <button onclick="startTest()">Test starten</button>
</div>

<div id="testArea">
  <p>Klicke auf die Farbe, in der das Wort geschrieben ist.</p>
  <div id="word">ROT</div>
  <button onclick="answer('rot')">Rot</button>
  <button onclick="answer('blau')">Blau</button>
  <button onclick="answer('gruen')">Grün</button>
  <button onclick="answer('gelb')">Gelb</button>
  <p id="progress"></p>
</div>

<div id="resultArea">
  <h2>Test beendet</h2>
  <p id="sendStatus">Danke für ihre Teilnahme</p>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxCnE_Mfb3AeVZSmB1kUkiRElD2gfAF0G9R8Q6j5VOnqkpL-Q7Glp8dti-ah2pWileX/exec";

const colors = [
  { name: "rot", css: "red", word: "ROT" },
  { name: "blau", css: "blue", word: "BLAU" },
  { name: "gruen", css: "green", word: "GRÜN" },
  { name: "gelb", css: "gold", word: "GELB" }
];

const numberOfTrials = 30;

let trials = [];
let currentTrial = 0;
let startTime = 0;
let results = [];
let participantId = "";
let age = "";

window.onload = function() {
  document.getElementById("startArea").style.display = "block";
  document.getElementById("testArea").style.display = "none";
  document.getElementById("resultArea").style.display = "none";
};

function startTest() {
  participantId = document.getElementById("participantId").value.trim();
  age = document.getElementById("age").value.trim();

  if (participantId === "" || age === "") {
    alert("Bitte Name und Alter eingeben.");
    return;
  }

  currentTrial = 0;
  results = [];
  createTrials();

  document.getElementById("startArea").style.display = "none";
  document.getElementById("resultArea").style.display = "none";
  document.getElementById("testArea").style.display = "block";

  showTrial();
}

function createTrials() {
  trials = [];
  let allCombinations = [];

  colors.forEach(wordColor => {
    colors.forEach(textColor => {
      allCombinations.push({
        word: wordColor.word,
        correctColor: textColor.name,
        cssColor: textColor.css,
        congruent: wordColor.name === textColor.name
      });
    });
  });

  let pool = [];
  for (let i = 0; i < 3; i++) {
    pool = pool.concat(allCombinations);
  }

  pool.sort(() => Math.random() - 0.5);
  trials = pool.slice(0, numberOfTrials);
}

function showTrial() {
  if (currentTrial >= trials.length) {
    endTest();
    return;
  }

  let trial = trials[currentTrial];

  document.getElementById("word").innerText = trial.word;
  document.getElementById("word").style.color = trial.cssColor;
  document.getElementById("progress").innerText =
    "Aufgabe " + (currentTrial + 1) + " von " + numberOfTrials;

  startTime = performance.now();
}

function answer(selectedColor) {
  let reactionTime = Math.round(performance.now() - startTime);
  let trial = trials[currentTrial];

  results.push({
    participantId: participantId,
    age: age,
    date: new Date().toISOString(),
    trial: currentTrial + 1,
    word: trial.word,
    correctColor: trial.correctColor,
    selectedColor: selectedColor,
    correct: selectedColor === trial.correctColor,
    reactionTimeMs: reactionTime,
    congruent: trial.congruent
  });

  currentTrial++;
  showTrial();
}

async function endTest() {
  document.getElementById("testArea").style.display = "none";
  document.getElementById("resultArea").style.display = "block";

  try {
    await fetch(SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify({ results: results })
    });

    document.getElementById("sendStatus").innerText =
      "Vielen Dank für ihre Teilnahme.";
  } catch (error) {
    document.getElementById("sendStatus").innerText =
      "Fehler beim Senden der Daten.";
  }
}
</script>

</body>
</html>
